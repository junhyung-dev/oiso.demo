<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>AI Tutor</h2>
                <button id="new-chat-btn" class="btn-primary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    New Chat
                </button>
            </div>
            <div class="session-list-container">
                <h3>Recent Sessions</h3>
                <ul id="session-list" class="session-list">
                    <!-- Sessions will be dynamically inserted here -->
                </ul>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <div class="chat-header">
                <h1 id="current-session-title">Select or Create a Chat</h1>
            </div>
            
            <div id="chat-messages" class="chat-messages">
                <!-- Messages will be dynamically inserted here -->
                <div class="empty-state">
                    <div class="greeting-icon">✨</div>
                    <h2>Welcome to AI Tutor!</h2>
                    <p>Select a session from the sidebar or start a new chat to begin learning.</p>
                </div>
            </div>

            <div class="chat-input-container">
                <form id="chat-form" class="chat-form">
                    <div class="input-wrapper">
                        <textarea id="message-input" placeholder="Ask anything..." rows="1" disabled></textarea>
                        <button type="submit" id="send-btn" class="btn-send" disabled>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </div>
                </form>
                <div class="footer-text">AI Tutor can make mistakes. Consider verifying important information.</div>
            </div>
        </main>
    </div>

    <!-- Required JS Libraries for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
